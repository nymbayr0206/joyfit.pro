# Joyfit – Nginx reverse proxy snippet for joyfit.pro
# If you already have SSL (e.g. Let's Encrypt), add this location inside your existing
# server { server_name joyfit.pro; ... } block that has ssl_certificate / ... ssl.
# Otherwise, use a new server block with listen 443 ssl and your cert paths.

location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
}
